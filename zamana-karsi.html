<body class="bg-amber-50 min-h-screen flex flex-col items-center py-6 font-sans text-gray-800 select-none">

    <!-- Ana Sayfaya Dön -->
    <div class="w-full flex justify-start px-4 mb-4 max-w-2xl mx-auto">
        <a href="index.html" class="bg-white border-2 border-amber-200 hover:bg-amber-100 text-amber-700 font-bold py-2 px-4 rounded-xl shadow-sm transition-transform active:scale-95 flex items-center gap-2">
            🏠 Ana Sayfaya Dön
        </a>
    </div>

    <header class="mb-6 text-center px-4">
        <h1 class="text-4xl font-black text-amber-600 mb-1">⚡ Zamana Karşı Yarış</h1>
        <p class="text-sm font-bold text-gray-500">60 Saniyede En Yüksek Skoru Yap!</p>
    </header>

    <main class="flex-1 w-full max-w-2xl px-4 flex flex-col items-center">
        
        <!-- Başlangıç Ekranı -->
        <div id="startScreen" class="bg-white p-8 rounded-3xl shadow-xl w-full text-center flex flex-col items-center">
            <div class="text-6xl mb-4">⏱️</div>
            <h2 class="text-2xl font-black text-gray-700 mb-2">Hazır mısın?</h2>
            <p class="text-gray-500 font-medium mb-6">Doğru cevaplar sana ekstra süre kazandırır, yanlış cevaplar ise sürenden çalar!</p>
            
            <div class="bg-amber-100 text-amber-800 p-4 rounded-2xl font-bold mb-6 w-full">
                🏆 En Yüksek Skorun: <span id="highScoreText" class="text-2xl font-black">0</span>
            </div>

            <button onclick="startSpeedRun()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-5 rounded-2xl shadow-lg transition-transform active:scale-95 text-2xl">
                🚀 Macerayı Başlat!
            </button>
        </div>

        <!-- Oyun Ekranı (Başlangıçta Gizli) -->
        <div id="gameArea" class="hidden w-full flex-col items-center">
            
            <!-- Sayaç ve Puan Çubuğu -->
            <div class="grid grid-cols-3 gap-2 w-full mb-6">
                <div class="bg-white p-3 rounded-2xl shadow-sm text-center border-2 border-amber-200">
                    <span class="text-xs text-gray-400 font-bold block uppercase">Kalan Süre</span>
                    <span id="timerText" class="text-3xl font-black text-red-500">60s</span>
                </div>
                <div class="bg-white p-3 rounded-2xl shadow-sm text-center border-2 border-amber-200">
                    <span class="text-xs text-gray-400 font-bold block uppercase">Puan</span>
                    <span id="scoreText" class="text-3xl font-black text-amber-600">0</span>
                </div>
                <div class="bg-white p-3 rounded-2xl shadow-sm text-center border-2 border-amber-200">
                    <span class="text-xs text-gray-400 font-bold block uppercase">Seri</span>
                    <span id="comboText" class="text-3xl font-black text-orange-500">0 🔥</span>
                </div>
            </div>

            <!-- Soru Kartı -->
            <div class="bg-white w-full rounded-3xl shadow-xl p-8 text-center">
                <div id="questionText" class="text-5xl font-black text-gray-700 mb-8 min-h-[60px] flex items-center justify-center">
                    <!-- Soru buraya gelecek -->
                </div>
                <div id="optionsGrid" class="grid grid-cols-2 gap-4 w-full">
                    <!-- Şıklar buraya gelecek -->
                </div>
            </div>
        </div>

        <!-- Bitiş Ekranı (Başlangıçta Gizli) -->
        <div id="endScreen" class="hidden bg-white p-8 rounded-3xl shadow-xl w-full text-center flex-col items-center">
            <div class="text-6xl mb-4">🔔</div>
            <h2 class="text-3xl font-black text-gray-700 mb-2">Süre Doldu!</h2>
            
            <div class="my-6 space-y-2">
                <p class="text-gray-500 font-bold text-lg">Toplam Puanın: <span id="finalScore" class="text-amber-600 text-3xl font-black">0</span></p>
                <p id="newRecordNotice" class="text-green-500 font-black text-xl hidden">🎉 YENİ REKOR!</p>
            </div>

            <button onclick="startSpeedRun()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-xl">
                🔄 Tekrar Dene
            </button>
        </div>

    </main>

            { q: "150'nin %20'si", a: 30, options: [15, 30, 45, 60] },
            { q: "250'nin %10'u", a: 25, options: [10, 25, 50, 75] },
            { q: "250'nin %20'si", a: 50, options: [25, 50, 75, 100] },
            { q: "300'ün %10'u", a: 30, options: [15, 30, 45, 60] },
            { q: "300'ün %20'si", a: 60, options: [30, 60, 90, 120] },
            { q: "400'ün %10'u", a: 40, options: [20, 40, 60, 80] },
            { q: "400'ün %20'si", a: 80, options: [40, 80, 120, 160] },
            { q: "500'ün %20'si", a: 100, options: [50, 100, 150, 200] },
            { q: "10'un %100'ü", a: 10, options: [5, 10, 15, 20] },
            { q: "20'nin %100'ü", a: 20, options: [10, 20, 30, 40] },
            { q: "50'nin %100'ü", a: 50, options: [25, 50, 75, 100] },
            { q: "100'ün %0'ı", a: 0, options: [0, 1, 10, 100] },
            { q: "x + 5 = 10", a: 5, options: [2, 5, 8, 10] },
            { q: "x - 3 = 7", a: 10, options: [4, 7, 10, 13] },
            { q: "2x = 10", a: 5, options: [2, 5, 8, 10] },
            { q: "x / 2 = 4", a: 8, options: [2, 4, 6, 8] },
            { q: "3x = 15", a: 5, options: [3, 5, 8, 15] },
            { q: "x + 10 = 20", a: 10, options: [5, 10, 15, 20] },
            { q: "x - 5 = 5", a: 10, options: [5, 10, 15, 20] },
            { q: "4x = 20", a: 5, options: [4, 5, 10, 20] },
            { q: "x / 3 = 3", a: 9, options: [3, 6, 9, 12] },
            { q: "5x = 25", a: 5, options: [5, 10, 15, 25] },
            { q: "x + 2 = 12", a: 10, options: [2, 10, 12, 14] },
            { q: "x - 1 = 9", a: 10, options: [1, 9, 10, 11] },
            { q: "6x = 18", a: 3, options: [2, 3, 6, 18] },
            { q: "x / 4 = 2", a: 8, options: [2, 4, 6, 8] },
            { q: "7x = 21", a: 3, options: [3, 7, 14, 21] },
            { q: "x + 7 = 14", a: 7, options: [7, 14, 21, 28] },
            { q: "x - 8 = 2", a: 10, options: [2, 8, 10, 12] },
            { q: "8x = 16", a: 2, options: [2, 4, 8, 16] },
            { q: "x / 5 = 2", a: 10, options: [2, 5, 10, 15] },
            { q: "9x = 27", a: 3, options: [3, 9, 18, 27] },
            { q: "x + 9 = 18", a: 9, options: [9, 18, 27, 36] }
        ];

        const correctSound = new Audio('sounds/correct.mp3');
        const wrongSound = new Audio('sounds/wrong.mp3');

        let score = 0;
        let combo = 0;
        let timeLeft = 60;
        let timer = null;
        let currentQ = null;

        // Yüksek skoru yükle
        let highScore = localStorage.getItem('speedRunHighScore') || 0;
        document.getElementById('highScoreText').innerText = highScore;

        function startSpeedRun() {
            score = 0;
            combo = 0;
            timeLeft = 60;
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('flex');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('gameArea').classList.add('flex');

            updateStats();
            nextQuestion();

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = `${timeLeft}s`;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextQuestion() {
            currentQ = questions5th[Math.floor(Math.random() * questions5th.length)];
            document.getElementById('questionText').innerText = `${currentQ.q} = ?`;

            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';

            const shuffledOptions = [...currentQ.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "bg-amber-100 hover:bg-amber-200 text-amber-900 font-black text-3xl py-5 rounded-2xl transition-transform active:scale-95 shadow-sm";
                btn.onclick = () => handleAnswer(opt);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswer(selected) {
            if (selected === currentQ.a) {
                correctSound.currentTime = 0;
                correctSound.play();
                combo++;
                score += 100 * combo;
                timeLeft += 2; // Doğru cevaba +2s bonus
            } else {
                wrongSound.currentTime = 0;
                wrongSound.play();
                combo = 0;
                timeLeft = Math.max(0, timeLeft - 3); // Yanlış cevaba -3s ceza
            }

            updateStats();
            if (timeLeft > 0) {
                nextQuestion();
            } else {
                endGame();
            }
        }

        function updateStats() {
            document.getElementById('scoreText').innerText = score;
            document.getElementById('comboText').innerText = `${combo} 🔥`;
            document.getElementById('timerText').innerText = `${timeLeft}s`;
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('endScreen').classList.add('flex');
            document.getElementById('finalScore').innerText = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('speedRunHighScore', highScore);
                document.getElementById('highScoreText').innerText = highScore;
                document.getElementById('newRecordNotice').classList.remove('hidden');
            } else {
                document.getElementById('newRecordNotice').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
