<!DOCTYPE html> 
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Macerası</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-100 min-h-screen flex flex-col font-sans text-gray-800 select-none">

    <!-- Üst Menü / Sınıf Seçimi -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center rounded-b-3xl mb-6 mx-2">
        <h1 class="text-2xl font-black text-sky-600">Matematik Macerası</h1>
        <select id="gradeSelect" class="bg-sky-50 border-2 border-sky-200 text-sky-700 rounded-xl p-2 font-bold outline-none cursor-pointer">
            <option value="1">1. Sınıf</option>
            <option value="2">2. Sınıf</option>
            <option value="3">3. Sınıf</option>
            <option value="4" disabled>4. Sınıf (Yakında)</option>
            <option value="5">5. Sınıf</option>
        </select>
    </header>

<!-- Oyun Alanı -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-2xl mx-auto w-full">
        
        <!-- YENİ EKLENEN: Mod Seçici Butonlar -->
        <div id="gameModeSwitcher" class="hidden flex justify-center mb-6 w-full gap-4">
            <!-- 3. Sınıf için Hafıza Oyunu -->
            <a id="memoryModeBtn" href="hafiza.html" class="hidden bg-amber-500 hover:bg-amber-600 text-white font-black py-3 px-6 rounded-full shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                🧠 Hafıza Oyununa Geç
            </a>

            <!-- 5. Sınıf için Zamana Karşı Yarış -->
            <a id="speedModeBtn" href="zamana-karsi.html" class="hidden bg-red-500 hover:bg-red-600 text-white font-black py-3 px-6 rounded-full shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                ⚡ Zamana Karşı Yarışa Geç
            </a>
        </div>
        
        <!-- Puan ve Seri Durumu -->
        <div class="flex justify-between w-full mb-6 px-4">
            <div class="text-lg font-bold bg-white px-4 py-2 rounded-2xl shadow-sm text-green-600">
                Puan: <span id="score">0</span>
            </div>
            <button id="muteBtn" onclick="toggleMute()" class="text-2xl p-2 rounded-full hover:bg-sky-100 transition-colors">
                🔊
            </button>
            <div class="text-lg font-bold bg-white px-4 py-2 rounded-2xl shadow-sm text-orange-500">
                Seri: <span id="combo">0</span> 🔥
            </div>
        </div>

        <!-- Soru Kartı -->
        <div class="bg-white w-full rounded-3xl shadow-xl p-8 text-center flex flex-col items-center">
            
            <h2 class="text-xl font-bold text-gray-400 mb-6 uppercase tracking-wider">Toplama İşlemi</h2>
            
            <!-- Görsel Soru Gösterimi -->
            <div id="visualQuestion" class="text-5xl mb-4 flex items-center justify-center gap-4 flex-wrap">
                <!-- JS ile buraya elmalar/nesneler gelecek -->
            </div>
            
            <div id="textQuestion" class="text-4xl font-black text-gray-700 mb-10">
                3 + 2 = ?
            </div>

            <!-- Cevap Şıkları -->
            <div id="options" class="grid grid-cols-2 gap-4 w-full">
                <!-- JS ile butonlar buraya basılacak -->
            </div>

            <!-- Sonuç ve Yeni Soru Butonu (Başlangıçta Gizli) -->
            <div id="resultArea" class="hidden flex-col items-center mt-6 w-full">
                <div id="feedbackText" class="text-2xl font-black mb-4"></div>
                <button onclick="loadNextQuestion()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-xl">
                    Sonraki Soru ➡️
                </button>
            </div>

        </div>
    </main>

    <script>
        // İleride bu veriyi external bir JSON dosyasından (ör: data/grade1.json) çekebilirsin.
        const database = {
            "1": [
                { q: "2 + 3", a: 5, options: [4, 5, 6, 7], icon: "🍎" },
                { q: "4 + 1", a: 5, options: [3, 4, 5, 6], icon: "⚽" },
                { q: "3 + 3", a: 6, options: [5, 6, 7, 8], icon: "⭐" },
                { q: "5 + 2", a: 7, options: [6, 7, 8, 9], icon: "🎈" },
                { q: "1 + 2", a: 3, options: [1, 2, 3, 4], icon: "🚗" }
            ],
            "2": [
                { q: "15 + 7", a: 22, options: [21, 22, 23, 24], type: "text" },
                { q: "24 - 8", a: 16, options: [14, 16, 18, 20], type: "text" },
                { q: "? + 6 = 14", a: 8, options: [7, 8, 9, 10], type: "missing" },
                { q: "20 - ? = 12", a: 8, options: [6, 8, 10, 12], type: "missing" },
                { q: "18 + 15", a: 33, options: [31, 33, 35, 37], type: "text" }
            ],
            "3": [
                { q: "5 x 4", a: 20, options: [15, 20, 24, 25], type: "text" },
                { q: "6 x 7", a: 42, options: [36, 42, 48, 49], type: "text" },
                { q: "24 ÷ 4", a: 6, options: [4, 6, 8, 12], type: "text" },
                { q: "36 ÷ 6", a: 6, options: [5, 6, 7, 8], type: "text" },
                { q: "? x 3 = 27", a: 9, options: [7, 8, 9, 10], type: "missing" },
                { q: "40 ÷ ? = 5", a: 8, options: [6, 7, 8, 9], type: "missing" },
                { q: "8 x 8", a: 64, options: [56, 60, 64, 72], type: "text" }
            ],
            "5": [
                { q: "3² + 4", a: 13, options: [10, 11, 13, 15], type: "text" },
                { q: "1/2 + 1/4", a: "3/4", options: ["2/4", "3/4", "1/6", "3/6"], type: "text" },
                { q: "0.5 + 0.2", a: "0.7", options: ["0.6", "0.7", "0.8", "0.9"], type: "text" },
                { q: "80'in %25'i", a: 20, options: [15, 20, 25, 40], type: "text" },
                { q: "120 ÷ 3 - 10", a: 30, options: [20, 30, 40, 50], type: "text" },
                { q: "5³", a: 125, options: [15, 25, 125, 150], type: "text" },
                { q: "7/10 - 2/10", a: "1/2", options: ["5/10", "1/2", "3/10", "4/10"], type: "text" }
            ]
        };

        let currentGrade = "1";
        let score = 0;
        let combo = 0;
        let currentQuestionIndex = 0;
        let currentQuestions = [];

        let isMuted = false;

        function toggleMute() {
            isMuted = !isMuted;
            
            // Ses nesnelerini sustur veya aç
            correctSound.muted = isMuted;
            wrongSound.muted = isMuted;
            
            // Buton ikonunu değiştir
            document.getElementById('muteBtn').innerText = isMuted ? "🔇" : "🔊";
        }

        // Ses nesnelerini oluştur (Dosya yollarını kendi projene göre ayarlayabilirsin)
        const correctSound = new Audio('sounds/correct.mp3');
        const wrongSound = new Audio('sounds/wrong.mp3');
        
        // Opsiyonel: Ses seviyelerini ayarlama (0.0 ile 1.0 arası)
        correctSound.volume = 0.8;
        wrongSound.volume = 0.5; // Hata sesi çocuğu korkutmasın diye biraz daha kısık olabilir

        // Oyunu Başlat
        function initGame() {
            const gradeDropdown = document.getElementById('gradeSelect');
            currentGrade = gradeDropdown.value;

            const modeSwitcher = document.getElementById('gameModeSwitcher');
            const memoryBtn = document.getElementById('memoryModeBtn');
            const speedBtn = document.getElementById('speedModeBtn');

            if (modeSwitcher && memoryBtn && speedBtn) {
                // Hepsini gizle
                modeSwitcher.classList.add('hidden');
                memoryBtn.classList.add('hidden');
                speedBtn.classList.add('hidden');

                if (currentGrade === "3") {
                    modeSwitcher.classList.remove('hidden');
                    memoryBtn.classList.remove('hidden');
                } else if (currentGrade === "5") {
                    modeSwitcher.classList.remove('hidden');
                    speedBtn.classList.remove('hidden');
                }
            }

            currentQuestions = [...database[currentGrade]].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            score = 0;
            combo = 0;
            updateUI();
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                currentQuestions = [...database[currentGrade]].sort(() => Math.random() - 0.5);
                currentQuestionIndex = 0;
            }
        
            const qData = currentQuestions[currentQuestionIndex];
            
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('options').classList.remove('hidden');
            document.getElementById('options').innerHTML = '';
        
            const textQuestionDiv = document.getElementById('textQuestion');
            const visualQuestionDiv = document.getElementById('visualQuestion');
        
            // Sınıf seviyesine göre ekranı ayarla
            if (currentGrade === "1") {
                visualQuestionDiv.classList.remove('hidden');
                const parts = qData.q.split('+');
                const num1 = parseInt(parts[0].trim());
                const num2 = parseInt(parts[1].trim());
                
                let visualHTML = `<span class="tracking-widest">${qData.icon.repeat(num1)}</span>`;
                visualHTML += `<span class="text-gray-300 font-bold px-2">+</span>`;
                visualHTML += `<span class="tracking-widest">${qData.icon.repeat(num2)}</span>`;
                visualQuestionDiv.innerHTML = visualHTML;
                
                textQuestionDiv.innerText = `${qData.q} = ?`;
            } else {
                // 2. Sınıf ve sonrası için görselleri gizle, metni büyüt
                visualQuestionDiv.classList.add('hidden');
                
                // Eğer verilmeyeni bulma sorusuysa "= ?" ekleme, doğrudan soruyu bas
                if (qData.type === "missing") {
                    textQuestionDiv.innerText = qData.q;
                } else {
                    textQuestionDiv.innerText = `${qData.q} = ?`;
                }
                
                // Metni 2. sınıf için biraz daha devasa yapabiliriz
                textQuestionDiv.className = "text-6xl font-black text-sky-700 mb-10";
            }
        
            const shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "bg-gray-100 hover:bg-sky-100 border-4 border-transparent hover:border-sky-300 text-gray-700 font-black text-4xl py-6 rounded-2xl shadow-sm transition-all active:scale-95";
                btn.onclick = () => checkAnswer(opt, qData.a, btn);
                document.getElementById('options').appendChild(btn);
            });
        }
            
        function checkAnswer(selected, correct, btnElement) {
            const optionsDiv = document.getElementById('options');
            const resultArea = document.getElementById('resultArea');
            const feedbackText = document.getElementById('feedbackText');
        
            optionsDiv.classList.add('hidden');
            resultArea.classList.remove('hidden');
            resultArea.classList.add('flex');
        
            if (selected === correct) {
                // Doğru sesini çal
                correctSound.currentTime = 0; 
                correctSound.play();
                
                combo++;
                score += 10 * combo; 
                feedbackText.innerText = "🎉 Harika! Doğru Bildin!";
                feedbackText.className = "text-2xl font-black mb-4 text-green-500";
            } else {
                // Yanlış sesini çal
                wrongSound.currentTime = 0;
                wrongSound.play();
                
                combo = 0; 
                feedbackText.innerText = `😔 Doğru cevap ${correct} olacaktı.`;
                feedbackText.className = "text-2xl font-black mb-4 text-red-500";
            }
            updateUI();
        }

        function loadNextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = combo;
        }

        // Dropdown değiştiğinde oyunu yeniden başlat
        document.getElementById('gradeSelect').addEventListener('change', () => {
            initGame();
        });
            
            // 3. Sınıf seçildiğinde butonu göster, diğerlerinde gizle
            const modeSwitcher = document.getElementById('gameModeSwitcher');
            if (currentGrade === "3") {
                modeSwitcher.classList.remove('hidden');
            } else {
                modeSwitcher.classList.add('hidden');
            }

            initGame();

        // Sayfa yüklendiğinde başlat
        initGame();

    </script>
</body>
</html>
